name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
      - run: npm test

      - name: Pack tarball
        run: npm pack

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: package-tarball
          path: vault-tasks-*.tgz
          retention-days: 1

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: package-tarball

      - name: Publish with provenance
        run: npm publish vault-tasks-*.tgz --provenance --access public

  publish-pypi:
    # Independent of publish-npm so a transient PyPI failure does not require
    # re-running npm publish (and vice versa). Both rely on the same `build`
    # job so the npm tarball and pip wheel come from the same commit.
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - run: npm ci
      - run: npm run build:wheel

      - name: Install Python build tooling
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        working-directory: python
        run: python -m build

      - name: Publish to PyPI (Trusted Publishing)
        # Configure on PyPI under Account Settings → Publishing → "Add a new
        # pending publisher" with workflow `publish.yml` and environment unset.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
